site_name: Formazione Commerciale - HyperBeauty
site_url: https://ivanrobuschi-custom.github.io/hyperbeauty-corso-commerciale/
site_description: Corso commerciale per concessionari e installatori HyperBeauty — Custom S.p.A.
site_author: Ivan Robuschi

theme:
  name: material
  language: it
  logo: assets/icons/logo.png
  favicon: assets/icons/favicon.png
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.sections
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share

  palette:
    primary: blue
    accent: blue

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search:
      lang: it
  - tags

extra:
  generator: false

copyright: Copyright Custom S.p.A. 2026

nav:
  - Introduzione: index.md
  - Contesto di Mercato: mercato.md
  - Il Prodotto: prodotto.md
  - I Piani: piani.md
  - Configurazioni Consigliate: configurazioni-consigliate.md
  - Il Cliente Tipo: cliente.md
  - Argomentario di Vendita: argomentario.md
  - Materiali e Risorse: risorse.md
